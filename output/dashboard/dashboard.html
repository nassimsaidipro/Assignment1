<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>SmartTravel A2 Dashboard</title>
    <link rel='stylesheet' href='styles.css'>
</head>
<body>
    <div class='container'>
        <header>
            <h1>SmartTravel Dashboard</h1>
            <p>A2: File I/O + Exceptions | 0 Clients | 0 Trips</p>
        </header>
        <section class='data-section'>
            <h2> Clients (0)</h2>
            <table>
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Email</th><th>Total Spent ($)</th></tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section>
        <section class='data-section'>
            <h2> Trips (0)</h2>
            <table>
                <thead>
                    <tr><th>ID</th><th>Client</th><th>Destination</th><th>Days</th><th>Price</th></tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section>
        <section class='charts-section'>
            <h2>Analytics (JFreeChart)</h2>
            <div class='chart-grid'>
                <figure class='chart-card'>
                    <img src='../charts/trip_cost_bar_chart.png' alt='Trip Costs' loading='lazy'>
                    <figcaption>Total Cost per Trip</figcaption>
                </figure>
                <figure class='chart-card'>
                    <img src='../charts/trips_per_destination_pie.png' alt='Destinations' loading='lazy'>
                    <figcaption>Trips per Destination</figcaption>
                </figure>
                <figure class='chart-card'>
                    <img src='../charts/trip_duration_line_chart.png' alt='Durations' loading='lazy'>
                    <figcaption>Trip Durations</figcaption>
                </figure>
            </div>
        </section>
        <section class='stats-section'>
            <h2>No Trip Data</h2>
        </section>
    </div>
</body>
</html>
